name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: uninet smoke --output-dir data/smoke
      - run: uninet inspect data/smoke/tmatrix-smoke.json

  model-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[model]'
      - run: python -m unittest discover -s tests -p test_model.py -v
      - run: >-
          python tasks/task1_anomaly_detection.py
          --config configs/tasks/task1_anomaly.json
          --pretrain-epochs 1 --autoencoder-epochs 1 --batch-size 8
      - run: >-
          python tasks/task2_attack_identification.py
          --config configs/tasks/task2_attack.json --epochs 1 --batch-size 8
      - run: >-
          python tasks/task3_iot_device_identification.py
          --config configs/tasks/task3_iot.json --epochs 1 --batch-size 8
      - run: >-
          python tasks/task4_website_fingerprinting.py
          --config configs/tasks/task4_website.json --epochs 1 --batch-size 8
